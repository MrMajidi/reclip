version: '3.8'

services:
  app:
    build: .
    container_name: reclip-app
    ports:
      - "8899:8899"
    environment:
      - PORT=8899
      - HOST=0.0.0.0
    env_file: .env
    volumes:
      - data:/var/lib/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
    driver: local
